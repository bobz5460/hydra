services:
  hydra-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hydra-selfhost-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
      - "4001:4001"
    environment:
      HOST: 0.0.0.0
      PORT: 4000
      WS_PORT: 4001
      PUBLIC_BASE_URL: http://localhost:4000
      DATA_DIR: /app/data
    volumes:
      - hydra_backend_data:/app/data

volumes:
  hydra_backend_data:
